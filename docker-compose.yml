services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stream}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stream}
      POSTGRES_DB: ${POSTGRES_DB:-stream_friends}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stream}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: dev
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-stream}:${POSTGRES_PASSWORD:-stream}@db:5432/${POSTGRES_DB:-stream_friends}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
